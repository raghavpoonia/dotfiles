# tmux.conf
# raghavpoonia/dotfiles

# ── Prefix key ───────────────────────────────────────────────────────────────
# Changed from Ctrl+B (awkward) to Ctrl+Space (natural)
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# ── Indexing ─────────────────────────────────────────────────────────────────
# Start windows and panes at 1, not 0 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# ── Mouse support ─────────────────────────────────────────────────────────────
set -g mouse on

# ── Terminal colors ──────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ',xterm-256color:RGB'

# ── Vim-style pane navigation ────────────────────────────────────────────────
# Use Ctrl+hjkl to move between panes — same keys as Neovim splits
# No prefix needed
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ── Pane splits ───────────────────────────────────────────────────────────────
# | for vertical split, - for horizontal — more intuitive than % and "
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── New windows open in current path ─────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ── Reload config without restart ────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Copy mode (vi keys) ──────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style 'bg=colour235 fg=colour255'
set -g status-left '#[bold]  #S '
set -g status-right '#[fg=colour255]%H:%M %d-%b '
set -g status-right-length 50
set -g status-left-length 30

# Window status
setw -g window-status-current-style 'fg=colour0 bg=colour255 bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-style 'fg=colour255 bg=colour235'
setw -g window-status-format ' #I:#W '

# ── Reduce escape delay (important for Neovim inside tmux) ──────────────────
set -sg escape-time 10
set -g focus-events on

# ── History ───────────────────────────────────────────────────────────────────
set -g history-limit 50000
